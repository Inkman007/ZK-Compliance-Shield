name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.82.0"
          targets: wasm32v1-none
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (host target, for tests)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build WASM (release)
        run: cargo build --workspace --target wasm32v1-none --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: compliance-shield-wasm
          path: target/wasm32v1-none/release/compliance_shield.wasm
          if-no-files-found: error
